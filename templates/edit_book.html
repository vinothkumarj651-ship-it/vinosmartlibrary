{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Book</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{

            min-height:100vh;

            background:
            linear-gradient(
            rgba(0,0,0,0.65),
            rgba(0,0,0,0.65)
            ),
            url('/static/images/bg.webp');

            background-size:cover;
            background-position:center;
            background-attachment:fixed;

            color:white;

        }

        .container{

            width:92%;
            max-width:1200px;

            margin:auto;

            padding-top:40px;
            padding-bottom:40px;

        }

        .top-bar{

            display:flex;
            justify-content:space-between;
            align-items:center;

            margin-bottom:30px;

            background:rgba(255,255,255,0.10);

            padding:20px 30px;

            border-radius:22px;

            backdrop-filter:blur(14px);

        }

        .title{

            font-size:40px;
            font-weight:700;

        }

        .back-btn{

            text-decoration:none;

            background:#2563eb;

            color:white;

            padding:12px 22px;

            border-radius:12px;

            font-weight:600;

        }

        .form-card{

            background:rgba(255,255,255,0.10);

            backdrop-filter:blur(16px);

            border-radius:30px;

            padding:40px;

            border:1px solid rgba(255,255,255,0.10);

        }

        .book-image{

            width:220px;
            height:300px;

            object-fit:cover;

            border-radius:18px;

            border:3px solid rgba(255,255,255,0.20);

            margin-bottom:25px;

            background:white;

        }

        .input-grid{

            display:grid;

            grid-template-columns:1fr 1fr;

            gap:20px;

        }

        .input-box{

            margin-bottom:20px;

        }

        .input-box.full{

            grid-column:1/3;

        }

        .input-box label{

            display:block;

            margin-bottom:10px;

            font-size:16px;

            font-weight:600;

        }

        .input-box input{

            width:100%;

            padding:16px;

            border:none;

            outline:none;

            border-radius:14px;

            background:rgba(255,255,255,0.08);

            color:white;

            font-size:16px;

            border:1px solid rgba(255,255,255,0.10);

        }

        .save-btn{

            width:100%;

            padding:18px;

            border:none;

            border-radius:14px;

            background:#16a34a;

            color:white;

            font-size:18px;

            font-weight:700;

            cursor:pointer;

            margin-top:15px;

            transition:0.3s;

        }

        .save-btn:hover{

            background:#15803d;

        }

        @media(max-width:800px){

            .input-grid{

                grid-template-columns:1fr;

            }

            .input-box.full{

                grid-column:auto;

            }

            .top-bar{

                flex-direction:column;

                gap:20px;

                text-align:center;

            }

        }

    </style>

</head>

<body>

    <div class="container">

        <!-- TOP -->

        <div class="top-bar">

            <h1 class="title">

                ✏ Edit Book

            </h1>

            <a href="/admin-view-books/" class="back-btn">

                ⬅ Back

            </a>

        </div>

        <!-- FORM -->

        <div class="form-card">

            <form method="POST" enctype="multipart/form-data">

                {% csrf_token %}

                {% if book.cover_image %}

                    <img
                        src="{{ book.cover_image.url }}"
                        class="book-image"
                    >

                {% else %}

                    <img
                        src="/static/images/no-book.png"
                        class="book-image"
                    >

                {% endif %}

                <div class="input-grid">

                    <div class="input-box full">

                        <label>

                            📸 Change Book Cover Image

                        </label>

                        <input
                            type="file"
                            name="cover_image"
                            accept="image/*"
                            capture="environment"
                        >

                    </div>

                    <div class="input-box full">

                        <label>

                            📘 Book Title

                        </label>

                        <input
                            type="text"
                            name="title"
                            value="{{ book.title }}"
                            required
                        >

                    </div>

                    <div class="input-box full">

                        <label>

                            ✍ Author Name

                        </label>

                        <input
                            type="text"
                            name="author"
                            value="{{ book.author }}"
                            required
                        >

                    </div>

                    <div class="input-box">

                        <label>

                            🏛 Section

                        </label>

                        <input
                            type="text"
                            name="section"
                            value="{{ book.section }}"
                            required
                        >

                    </div>

                    <div class="input-box">

                        <label>

                            📂 Row

                        </label>

                        <input
                            type="text"
                            name="row"
                            value="{{ book.row }}"
                            required
                        >

                    </div>

                    <div class="input-box">

                        <label>

                            📍 Column

                        </label>

                        <input
                            type="text"
                            name="column"
                            value="{{ book.column }}"
                            required
                        >

                    </div>

                    <div class="input-box">

                        <label>

                            📦 Quantity

                        </label>

                        <input
                            type="number"
                            name="quantity"
                            value="{{ book.quantity }}"
                            required
                        >

                    </div>

                </div>

                <button type="submit" class="save-btn">

                    💾 Save Changes

                </button>

            </form>

        </div>

    </div>

</body>

</html>
