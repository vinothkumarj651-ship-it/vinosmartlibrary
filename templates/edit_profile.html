{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Profile</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{

            background:
            linear-gradient(
            rgba(0,0,0,0.65),
            rgba(0,0,0,0.65)
            ),
            url('/static/images/bg.webp');

            background-size:cover;
            background-position:center;
            background-attachment:fixed;

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:40px;

        }

        .form-box{

            width:100%;

            max-width:550px;

            background:rgba(255,255,255,0.10);

            backdrop-filter:blur(15px);

            border-radius:25px;

            padding:40px;

            border:1px solid rgba(255,255,255,0.10);

            color:white;

        }

        .title{

            text-align:center;

            font-size:38px;

            font-weight:700;

            margin-bottom:30px;

        }

        .profile-preview{

            display:flex;

            justify-content:center;

            margin-bottom:25px;

        }

        .profile-preview img{

            width:120px;

            height:120px;

            border-radius:50%;

            object-fit:cover;

            border:4px solid white;

        }

        .input-box{

            margin-bottom:22px;

        }

        .input-box label{

            display:block;

            margin-bottom:10px;

            font-size:16px;

            font-weight:600;

        }

        .input-box input,
        .input-box select{

            width:100%;

            padding:14px;

            border:none;

            border-radius:12px;

            outline:none;

            font-size:16px;

            background:rgba(255,255,255,0.15);

            color:white;

        }

        .input-box input::placeholder{

            color:#ddd;

        }

        .input-box input[type="file"]{

            padding:10px;

            cursor:pointer;

        }

        .btn-box{

            display:flex;

            gap:15px;

            margin-top:30px;

        }

        .save-btn{

            flex:1;

            background:#16a34a;

            color:white;

            border:none;

            padding:14px;

            border-radius:12px;

            font-size:17px;

            font-weight:600;

            cursor:pointer;

        }

        .back-btn{

            flex:1;

            text-decoration:none;

            background:#2563eb;

            color:white;

            text-align:center;

            padding:14px;

            border-radius:12px;

            font-size:17px;

            font-weight:600;

        }

        @media(max-width:600px){

            .form-box{

                padding:25px;

            }

            .title{

                font-size:30px;

            }

            .btn-box{

                flex-direction:column;

            }

        }

    </style>

</head>

<body>

    <div class="form-box">

        <h1 class="title">

            ✏ Edit Profile

        </h1>

        <div class="profile-preview">

            {% if profile.student_image %}

            <img
                src="{{ profile.student_image.url }}"
                alt="Student Image"
            >

            {% else %}

            <img
                src="{% static 'images/default-user.png' %}"
                alt="Default Image"
            >

            {% endif %}

        </div>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="input-box">

                <label>

                    📧 Email ID

                </label>

                <input
                    type="email"
                    name="email"
                    value="{{ profile.user.email }}"
                    required
                >

            </div>

            <div class="input-box">

                <label>

                    📱 Phone Number

                </label>

                <input
                    type="text"
                    name="phone"
                    value="{{ profile.phone }}"
                    required
                >

            </div>

            <div class="input-box">

                <label>

                    🎓 Year

                </label>

                <select name="year" required>

                    <option value="{{ profile.year }}">

                        Current : {{ profile.year }}

                    </option>

                    <option value="1st Year">

                        1st Year

                    </option>

                    <option value="2nd Year">

                        2nd Year

                    </option>

                    <option value="3rd Year">

                        3rd Year

                    </option>

                    <option value="4th Year">

                        4th Year

                    </option>

                </select>

            </div>

            <div class="input-box">

                <label>

                    🖼 Change Profile Image

                </label>

                <input
                    type="file"
                    name="student_image"
                    accept="image/*"
                >

            </div>

            <div class="btn-box">

                <button type="submit" class="save-btn">

                    Save Changes

                </button>

                <a href="/student-profile/" class="back-btn">

                    Back

                </a>

            </div>

        </form>

    </div>

</body>

</html>
